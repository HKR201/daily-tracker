name: Manual Android Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # သော့ကို မပျောက်အောင် အသေမှတ်ထားမယ့်စနစ်
      - name: Cache Android Keystore
        uses: actions/cache@v4
        with:
          path: ~/.android
          key: android-keystore-v1

      - name: Clean Workspace & Build APK
        run: |
          flutter create app_workspace --org com.tkr --project-name daily_tracker
          cp -r lib/* app_workspace/lib/
          cp pubspec.yaml app_workspace/
          cd app_workspace
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Create Key, Sign APK and Get SHA-1
        run: |
          # ၁။ သော့မရှိသေးရင် အလိုအလျောက် ဖန်တီးပါမယ်
          if [ ! -f ~/.android/debug.keystore ]; then
            mkdir -p ~/.android
            keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Daily Tracker"
          fi
          
          # ၂။ ထွက်လာတဲ့ APK ကို အဲဒီသော့နဲ့ ချိတ်ပိတ်ပါမယ်
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          $BUILD_TOOLS/apksigner sign --ks ~/.android/debug.keystore --ks-pass pass:android --key-pass pass:android app_workspace/build/app/outputs/flutter-apk/app-release.apk
          
          # ၃။ လက်ဗွေရာ (SHA-1) ကို ထုတ်ပြပါမယ်
          echo "==== ဤနေရာရှိ SHA1 လက်ဗွေရာကို ကူးယူပါ ===="
          keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android | grep "SHA1:"
          echo "======================================"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DailyTracker-Draft-APK
          path: app_workspace/build/app/outputs/flutter-apk/app-release.apk
          
